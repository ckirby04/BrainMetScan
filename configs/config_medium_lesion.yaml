# Configuration for Medium Lesion Detection (500-5000 voxels)
# Strategy: Balanced approach optimized for medium-sized metastases

# Data
data_dir: "data/train"
output_dir: "models_medium_lesion"

# Model architecture - balanced capacity
model_type: "lightweight"
base_channels: 20  # Slightly more than tiny model (16) but not too heavy
depth: 3
dropout: 0.1
use_attention: false
use_residual: true

# Training - 96x96x96 patches (good context for medium lesions)
patch_size: [96, 96, 96]
batch_size: 2
epochs: 100
lr: 0.001

# Loss function - Focus on medium lesions
loss_type: "small_lesion"  # Use weighted loss
small_lesion_threshold: 5000  # Changed: now "small" means < 5000 (medium range)
small_lesion_weight: 5.0  # Moderate weighting (between tiny's 10x and large's 1x)

# Fallback parameters
tversky_alpha: 0.4
tversky_beta: 0.6
focal_alpha: 0.75
focal_gamma: 2.0

# Sampling strategy - focus on medium lesions
sampling_strategy: "difficulty"
difficulty_multiplier: 5.0  # Moderate (not as aggressive as tiny)
oversample_small_lesions: true

# Learning rate schedule
scheduler: "cosine"
warmup_epochs: 5

# Augmentation - moderate
use_augmentation: true
augmentation_prob: 0.5
rotation_range: 15  # Slightly less than tiny model
scale_range: [0.9, 1.1]
elastic_deformation: true

# Regularization
gradient_clip: 1.0
weight_decay: 1e-5
early_stopping: true
patience: 20

# Validation
val_split: 0.15
num_workers: 4
save_freq: 25

# Inference settings
eval_patch_size: [96, 96, 96]
eval_overlap: 0.5  # Less overlap than tiny model (medium lesions are easier to detect)

# RATIONALE:
# 1. Patch size 96^3:
#    - Large enough to see full medium lesions (500-5000 voxels)
#    - Provides good context around lesions
#
# 2. Moderate weighting (5.0x):
#    - Not as aggressive as tiny model (10.0x)
#    - Helps focus on medium range without ignoring larger lesions
#
# 3. Threshold at 5000 voxels:
#    - Treats anything < 5000 as "small" to focus on medium range
#    - Prevents model from only learning large lesions
#
# 4. Base channels 20:
#    - More capacity than tiny model (16)
#    - Can handle more complex medium-sized structures
