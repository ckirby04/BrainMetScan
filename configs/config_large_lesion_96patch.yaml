# Configuration for Large Lesion Detection - High Resolution Context Model
# Strategy: 96^3 patches on 256^3 images for maximum context with high detail

# Data
data_dir: "../Superset/full/train"
test_dir: "../Superset/full/test"
output_dir: "model"
model_name: "large_lesion_96patch_hires"

# Model architecture - balanced for large patches
model_type: "lightweight"
base_channels: 24
depth: 3
dropout: 0.1
use_attention: true
use_residual: true

# Training - 96x96x96 patches on 256^3 volumes (high-res context)
patch_size: [96, 96, 96]
target_size: [256, 256, 256]  # 2x resolution vs original 128^3
batch_size: 2  # Large patches need smaller batch
epochs: 150
lr: 0.0008  # Slightly lower LR for stability

# Loss function - balanced across sizes
loss_type: "small_lesion"
small_lesion_threshold: 2000  # Focus on small-medium boundary
small_lesion_weight: 8.0  # Moderate weighting

# Tversky parameters - balanced
tversky_alpha: 0.3
tversky_beta: 0.7
focal_alpha: 0.7
focal_gamma: 2.5

# Sampling strategy
sampling_strategy: "difficulty"
difficulty_multiplier: 10.0
oversample_small_lesions: true
foreground_ratio: 0.9

# Learning rate schedule
scheduler: "cosine"
warmup_epochs: 10

# Augmentation - moderate
use_augmentation: true
augmentation_prob: 0.4
rotation_range: 10
scale_range: [0.95, 1.05]
elastic_deformation: true  # OK for larger patches

# Regularization
gradient_clip: 1.0
weight_decay: 0.0001
early_stopping: true
patience: 30

# Validation
val_split: 0.15
num_workers: 8  # Increased for 32GB RAM
save_freq: 10

# Inference settings
eval_patch_size: [96, 96, 96]
eval_overlap: 0.6  # Moderate overlap for large patches
eval_threshold: 0.4

# RATIONALE:
# 1. Patch size 96^3 at 256^3 resolution:
#    - Original 96^3 model used 128^3 resolution
#    - 256^3 gives 8x more voxels = much more detail
#    - Large patches capture full context around lesions
#
# 2. Benefits for ensemble:
#    - Sees wider anatomical context
#    - Better at lesion boundary delineation
#    - Complements tiny-patch models which lack context
#
# 3. Lower small_lesion_threshold (2000):
#    - This model focuses on medium-to-large range
#    - Leaves tiny detection to 16^3 and 24^3 models
#
# 4. Batch size 2:
#    - 96^3 = 884,736 voxels per patch
#    - Memory-constrained with 256^3 source volumes
#    - May need gradient accumulation if OOM
