# Model Registry Configuration
# Declares which models to load, their architectures, and inference settings

ensemble:
  fusion_mode: "union"  # union | weighted | hybrid
  default_threshold: 0.5

models:
  - name: "exp3_12patch_maxfn"
    path: "model/exp3_12patch_maxfn_best.pth"
    architecture: "lightweight"
    patch_size: 12
    threshold: 0.25
    base_channels: 16
    depth: 3
    use_attention: true
    use_residual: true

  - name: "exp1_8patch"
    path: "model/exp1_8patch_best.pth"
    architecture: "lightweight"
    patch_size: 8
    threshold: 0.3
    base_channels: 16
    depth: 3
    use_attention: true
    use_residual: true

  - name: "improved_24patch"
    path: "model/improved_24patch_best.pth"
    architecture: "lightweight"
    patch_size: 24
    threshold: 0.5
    base_channels: 16
    depth: 3
    use_attention: true
    use_residual: true

  - name: "improved_36patch"
    path: "model/improved_36patch_best.pth"
    architecture: "lightweight"
    patch_size: 36
    threshold: 0.5
    base_channels: 16
    depth: 3
    use_attention: true
    use_residual: true

# Inference defaults
inference:
  window_size: [96, 96, 96]
  overlap: 0.75
  use_tta: false
  tta_mode: "minimal"
  postprocessing:
    min_size: 15
    opening_size: 1
    closing_size: 1
